name: ML Pipeline CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full pipeline
        run: make pipeline

      - name: Run tests
        run: make test
